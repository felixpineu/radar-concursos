name: Radar Concursos Fórum Estudante

# Corre dias úteis às 11:00 UTC (= 12:00 em Portugal no horário de verão,
# 11:00 no horário de inverno). O cron do GitHub usa sempre UTC.
on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:        # permite correr manualmente no botão "Run workflow"
    inputs:
      mode:
        description: "Modo de execução"
        type: choice
        options: [daily, backfill]
        default: daily

permissions:
  contents: write           # necessário para guardar a BD (radar.db) de volta no repo

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Obter o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar Chromium (Playwright, fonte BASE)
        run: python -m playwright install --with-deps chromium

      - name: Correr o radar
        run: python main.py --mode "${{ github.event.inputs.mode || 'daily' }}"

      - name: Guardar a base de dados (radar.db)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add radar.db
          git commit -m "Atualiza base de dados (execução diária)" || echo "Sem alterações na BD"
          git push || echo "Nada para enviar"

      # NOTA: o envio de email entra na Fase E (emailing/mail.py, a ler da BD).
